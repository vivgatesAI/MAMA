<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAMA — Medical Affairs Manuscript AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Georgia', serif; background: linear-gradient(135deg, #f8f4f0, #ede4d5); }
        .hero { background: linear-gradient(rgba(58,47,31,0.85), rgba(58,47,31,0.9)), url('https://picsum.photos/id/1015/2000/1200'); background-size: cover; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
    </style>
</head>
<body class="min-h-screen text-[#2c2520]">
    <div class="hero h-screen flex items-center justify-center text-white text-center">
        <div class="max-w-3xl px-6">
            <h1 class="text-6xl font-light tracking-tight mb-4">MAMA</h1>
            <p class="text-2xl font-light opacity-90">Medical Affairs Manuscript AI</p>
            <p class="mt-6 text-lg opacity-75">Elegant. Precise. Powered by Venice AI.</p>
            <div class="mt-12">
                <a href="#upload" class="inline-block bg-white text-[#3a2f1f] px-10 py-4 rounded-full text-lg font-medium hover:bg-amber-100 transition">
                    Start Creating Manuscript
                </a>
            </div>
        </div>
    </div>

    <div id="upload" class="max-w-4xl mx-auto px-6 py-16">
        <div class="card bg-white rounded-3xl shadow-xl p-10">
            <h2 class="text-3xl font-light mb-8 flex items-center gap-3">
                <i class="fas fa-upload"></i> Upload Supporting Documents
            </h2>
            
            <div class="border-2 border-dashed border-amber-300 rounded-2xl p-12 text-center hover:border-amber-400 transition">
                <i class="fas fa-cloud-upload-alt text-5xl text-amber-400 mb-4"></i>
                <p class="text-lg">Drop PDFs, Word files, or CSRs here</p>
                <input type="file" multiple class="mt-6 opacity-70">
            </div>

            <div class="mt-10">
                <label class="block text-sm font-medium mb-2">Research Topic or Study Title</label>
                <input type="text" placeholder="Efficacy of Novel Therapy in HER2+ Breast Cancer" 
                       class="w-full px-6 py-4 rounded-2xl border border-amber-200 focus:outline-none focus:border-amber-400 text-lg">
            </div>

            <button onclick="generateManuscript()" 
                    class="mt-10 w-full bg-[#3a2f1f] hover:bg-black text-white py-5 rounded-2xl text-xl font-light tracking-wide transition">
                Generate Manuscript with Venice AI
            </button>
        </div>

        <div class="text-center text-xs text-amber-700/60 mt-12">
            Powered by Venice • Nano Banana Pro + Embeddings RAG • Designed with French elegance
        </div>
    </div>

    <script>
        function generateManuscript() {
            alert("🚀 MAMA is generating your manuscript using Venice AI...\n\n(RAG + Embeddings are active. This is a beautiful static demo for Railway.)");
        }
    </script>
</body>
</html>
